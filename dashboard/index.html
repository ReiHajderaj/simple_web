<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/c3ccefe88c.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="icon" href="../assets/icons/icon.png" type="image/png">
    
    <title>Social Media</title>
</head>
<body>
    
    

    <div class="body">
        <nav class="navbar">
            
        </nav>
        
        <!-- The sector below contains the main body 2 parts , side nav and body-->
        <div class="second_container">
            <div class="side_nav">
                
            </div>
            <div class="main_body">
                <div class="posting_container">
                    <input class="posting_input" type="text" placeholder="What are you thinking?">
                    <textarea class="posting_content" placeholder="Describe your experience.." rows="5"></textarea>
                    <div class="image-upload">
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                        <label for="imageInput" class="upload-label">
                            <i class="fas fa-image"></i> Add Image
                        </label>
                        <div id="imagePreview" style="display: none;">
                            <img id="preview" src="" alt="Preview" style="max-width: 100%; max-height: 200px; margin-top: 10px;">
                            <button onclick="removeImage()" class="remove-image">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <div class="posting_buttons">
                        <button class="postBtn">Post it</button>
                        <button class="draftBtn">Save Draft</button>
                    </div>
                </div>

                <div class="post_container">

                    
        
                </div>
            </div>

        </div>
    </div>
</body>
<script src="../assets/components/Navbar.js"></script>
<script src="../assets/components/Sidebar.js"></script>
<script src="../assets/js/isNotLogin.js"></script>
<script src="../assets/js/dashboard.js">
</script>
</html>
